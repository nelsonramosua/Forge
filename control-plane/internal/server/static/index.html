<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ee;
      --fg: #172026;
      --muted: #5d6973;
      --line: #d9d2c7;
      --accent: #0f766e;
      --panel: #ffffff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 40px;
    }
    nav {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    a {
      color: var(--accent);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.25rem, 9vw, 5rem);
      line-height: 0.95;
      letter-spacing: 0;
    }
    .lead {
      margin: 24px 0 0;
      max-width: 640px;
      color: var(--muted);
      font-size: 1.125rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 40px;
    }
    .stat {
      min-height: 112px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .label {
      color: var(--muted);
      font-size: 0.85rem;
    }
    .value {
      margin-top: 8px;
      color: var(--accent);
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    @media (max-width: 720px) {
      header {
        display: block;
      }
      nav {
        margin-top: 18px;
      }
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <strong>Forge</strong>
      <nav aria-label="Links">
        <a href="https://github.com/nelsonramosua/Forge">GitHub</a>
        <a href="https://admin.nforge.space">Admin</a>
      </nav>
    </header>
    <section aria-labelledby="title">
      <h1 id="title">Push to GitHub. Forge runs it.</h1>
      <p class="lead">A small self-hosted deployment platform for services, workers, and experiments.</p>
    </section>
    <section class="stats" aria-label="Forge status">
      <div class="stat">
        <div class="label">Workers online</div>
        <div class="value" id="workers-online">-</div>
      </div>
      <div class="stat">
        <div class="label">Apps running</div>
        <div class="value" id="apps-running">-</div>
      </div>
      <div class="stat">
        <div class="label">Deployments tracked</div>
        <div class="value" id="deployments-tracked">-</div>
      </div>
    </section>
  </main>
  <script>
    async function refreshStatus() {
      const response = await fetch('/api/v1/status', {cache: 'no-store'});
      if (!response.ok) {
        throw new Error('status unavailable');
      }
      const status = await response.json();
      document.getElementById('workers-online').textContent = status.workers_online ?? '-';
      document.getElementById('apps-running').textContent = status.apps_running ?? '-';
      const deployments = Object.values(status.deployments || {}).reduce((sum, value) => sum + Number(value || 0), 0);
      document.getElementById('deployments-tracked').textContent = deployments;
    }
    refreshStatus().catch(() => {});
    setInterval(() => {
      refreshStatus().catch(() => {});
    }, 15000);
  </script>
</body>
</html>
