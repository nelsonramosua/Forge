name: mission-control
runtime: python3.11
build:
  commands:
    - python3 -m venv .venv
    - . .venv/bin/activate && python -m pip install -r requirements.txt
    - . .venv/bin/activate && python -m py_compile app.py
run:
  command: . .venv/bin/activate && uvicorn app:app --host 0.0.0.0 --port $PORT
  port: 8000
resources:
  memory: 256M
  cpu: 0.5
health:
  path: /healthz
  interval: 3s
  timeout: 2s
  retries: 10
env:
  - APP_MESSAGE
  - APP_ENV
  - APP_VERSION
  - GIT_COMMIT
  - TEAM_NAME
  - REGION
