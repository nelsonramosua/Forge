name: myapp
runtime: python3.11
build:
  commands:
    - python3 -m venv .venv
    - . .venv/bin/activate && python -m pip install -r requirements.txt
    - . .venv/bin/activate && python manage.py collectstatic --noinput
run:
  command: . .venv/bin/activate && uvicorn app:main --host 0.0.0.0 --port $PORT
  port: 8000
resources:
  memory: 256M
  cpu: 0.5
health:
  path: /health
  interval: 10s
  timeout: 3s
  retries: 3
env:
  - DATABASE_URL
  - SECRET_KEY
