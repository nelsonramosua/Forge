name: Drift check

on:
  # Runs every monday at 07:00 UTC
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write       # to open issues in case of drift

jobs:
  drift:
    name: Terraform drift (AWS)
    runs-on: ubuntu-latest
    # no concurrency here - if a plan is already running, let if finish
    environment: production
    env:
      AWS_DRIFT_ROLE_ARN: ${{ secrets.AWS_DRIFT_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'eu-west-1' }}
      FORGE_ADMIN_CIDR: ${{ secrets.FORGE_ADMIN_CIDR }}
      FORGE_BASE_DOMAIN: ${{ secrets.FORGE_BASE_DOMAIN }}
      FORGE_SSH_PUBLIC_KEY: ${{ secrets.FORGE_SSH_PUBLIC_KEY }}
      LEGACY_AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      LEGACY_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~1.7"

      - name: Validate drift configuration
        run: |
          missing=0
          for name in AWS_REGION FORGE_BASE_DOMAIN FORGE_ADMIN_CIDR FORGE_SSH_PUBLIC_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Set ${name} for the drift-check workflow."
              missing=1
            fi
          done

          if [ -z "${AWS_DRIFT_ROLE_ARN}" ]; then
            if [ -z "${LEGACY_AWS_ACCESS_KEY_ID}" ] || [ -z "${LEGACY_AWS_SECRET_ACCESS_KEY}" ]; then
              echo "::error::Set AWS_DRIFT_ROLE_ARN for OIDC, or set legacy AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY secrets."
              missing=1
            fi
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Configure AWS credentials with OIDC
        if: env.AWS_DRIFT_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_DRIFT_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: env.AWS_DRIFT_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure S3 bucket and DynamoDB table for Terraform state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="forge-terraform-state-${ACCOUNT_ID}"
          TABLE_NAME="terraform-locks"

          if ! aws s3 ls "s3://${BUCKET_NAME}" 2>/dev/null; then
            echo "Creating S3 bucket: ${BUCKET_NAME}"
            aws s3api create-bucket \
              --bucket "${BUCKET_NAME}" \
              --region "${AWS_REGION}" \
              --create-bucket-configuration LocationConstraint="${AWS_REGION}" \
              2>/dev/null || echo "Bucket already exists."
            aws s3api put-bucket-versioning \
              --bucket "${BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${BUCKET_NAME}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          else
            echo "S3 bucket ${BUCKET_NAME} already exists."
          fi

          if ! aws dynamodb describe-table --table-name "${TABLE_NAME}" --region "${AWS_REGION}" 2>/dev/null; then
            echo "Creating DynamoDB table: ${TABLE_NAME}"
            aws dynamodb create-table \
              --table-name "${TABLE_NAME}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${AWS_REGION}" \
              2>/dev/null || echo "Table already exists."
          else
            echo "DynamoDB table ${TABLE_NAME} already exists."
          fi

      - name: Write SSH public key
        run: |
          mkdir -p /tmp/forge-drift
          printf '%s' "${FORGE_SSH_PUBLIC_KEY}" \
            | sed 's/\\n/\n/g' \
            | tr -d '\r' \
            > /tmp/forge-drift/forge_aws.pub
          printf '\n' >> /tmp/forge-drift/forge_aws.pub
          if ! ssh-keygen -l -f /tmp/forge-drift/forge_aws.pub >/dev/null; then
            echo "::error::FORGE_SSH_PUBLIC_KEY is not a valid OpenSSH public key."
            exit 1
          fi

      - name: Write tfvars
        run: |
          cat > infra/terraform/aws/terraform.tfvars << EOF
          aws_region          = "${AWS_REGION}"
          base_domain         = "${FORGE_BASE_DOMAIN}"
          admin_cidr          = "${FORGE_ADMIN_CIDR}"
          ssh_public_key_path = "/tmp/forge-drift/forge_aws.pub"
          key_pair_name       = "forge-aws"
          EOF

      - name: Create backend config for S3
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          cat > infra/terraform/aws/backend-config.tfvars << EOF
          bucket         = "forge-terraform-state-${ACCOUNT_ID}"
          key            = "aws/terraform.tfstate"
          region         = "${AWS_REGION}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init (with S3 backend)
        run: terraform -chdir=infra/terraform/aws init \
          -backend-config=backend-config.tfvars \
          -input=false

      - name: Terraform plan (drift detection)
        id: plan
        run: |
          set +e
          terraform -chdir=infra/terraform/aws plan \
            -detailed-exitcode \
            -refresh=true \
            -input=false \
            -out=/tmp/tfplan \
            2>&1 | tee /tmp/plan_output.txt
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          set -e

          # exit codes: 0 = no drift, 1 = error, 2 = there is drift
          case $EXIT_CODE in
            0) echo "drift=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "drift=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "drift=error" >> "$GITHUB_OUTPUT"; exit $EXIT_CODE ;;
          esac

      - name: Show plan summary
        if: steps.plan.outputs.drift == 'true'
        run: |
          echo "### Drift detected" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Show only the diff lines (+ / - / ~) to not expose IPs in the log
          grep -E "^\s*(#|\+|-|~|Plan:)" /tmp/plan_output.txt \
            | grep -v "aws_access_key\|secret\|password\|token" \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Open GitHub issue on drift
        if: steps.plan.outputs.drift == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/plan_output.txt', 'utf8');

            // Filter sensitive lines before putting them in the issue
            const safe = raw
              .split('\n')
              .filter(l => /^\s*(#|\+|-|~|Plan:|No changes)/.test(l))
              .filter(l => !/secret|token|password|key_id/i.test(l))
              .join('\n');

            const title = `Terraform drift detected — ${new Date().toISOString().slice(0,10)}`;

            // Search open issues with the same title (avoid duplicates)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            const duplicate = existing.data.find(i => i.title.startsWith('Terraform drift'));

            if (duplicate) {
              await github.rest.issues.createComment({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: duplicate.number,
                body: `### New detection — ${new Date().toISOString()}\n\n\`\`\`\n${safe}\n\`\`\`\n\n` +
                      `[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              });
              console.log(`Comment added to issue #${duplicate.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                labels: ['drift', 'area: infra'],
                body: `## Drift detected in AWS infrastructure\n\nThe \`terraform plan\` found differences between state and infrastructure.\n\n` +
                      `### Changes\n\n\`\`\`\n${safe}\n\`\`\`\n\n### Next steps\n` +
                      `1. Verify if changes are expected\n` +
                      `2. If yes: run \`terraform apply\` to update state\n` +
                      `3. If no: investigate who modified infrastructure\n\n` +
                      `[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              });
              console.log(`Issue created: #${issue.data.number}`);
            }

      - name: Close drift issue if there is no more drift
        if: steps.plan.outputs.drift == 'false'
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            for (const issue of existing.data) {
              if (issue.title.startsWith('Terraform drift')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  body: `Drift resolved — \`terraform plan\` found no changes on ` +
                        `${new Date().toISOString().slice(0,10)}.\n\n[View run](` +
                        `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                console.log(`Issue #${issue.number} closed.`);
              }
            }

      - name: Fail job if drift detected
        if: steps.plan.outputs.drift == 'true'
        run: |
          echo "::error::Drift detected. Verify the issue created in the repository."
          exit 1
