name: Drift check

on:
  # Corre toda a segunda-feira às 07:00 UTC (08:00 Lisboa inverno, 08:00 verão)
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write       # para abrir issues em caso de drift

jobs:
  drift:
    name: Terraform drift (AWS)
    runs-on: ubuntu-latest
    # Sem concurrência aqui — se já está a correr um plan deixa acabar
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── Criar bucket S3 para state (se não existir) ──────────────────────
      - name: Ensure S3 bucket and DynamoDB table for Terraform state
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="forge-terraform-state-${ACCOUNT_ID}"
          TABLE_NAME="terraform-locks"

          # Criar bucket S3
          if ! aws s3 ls "s3://${BUCKET_NAME}" 2>/dev/null; then
            echo "Criando bucket S3: ${BUCKET_NAME}"
            aws s3api create-bucket \
              --bucket "${BUCKET_NAME}" \
              --region "${{ secrets.AWS_REGION }}" \
              --create-bucket-configuration LocationConstraint="${{ secrets.AWS_REGION }}" \
              2>/dev/null || echo "Bucket já existe."
            # Ativar versionamento e encriptação
            aws s3api put-bucket-versioning \
              --bucket "${BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "${BUCKET_NAME}" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          else
            echo "Bucket S3 ${BUCKET_NAME} já existe."
          fi

          # Criar tabela DynamoDB para locks
          if ! aws dynamodb describe-table --table-name "${TABLE_NAME}" --region "${{ secrets.AWS_REGION }}" 2>/dev/null; then
            echo "Criando tabela DynamoDB: ${TABLE_NAME}"
            aws dynamodb create-table \
              --table-name "${TABLE_NAME}" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "${{ secrets.AWS_REGION }}" \
              2>/dev/null || echo "Tabela já existe."
          else
            echo "Tabela DynamoDB ${TABLE_NAME} já existe."
          fi

          echo "TERRAFORM_BACKEND_BUCKET=forge-terraform-state-${ACCOUNT_ID}" >> "$GITHUB_ENV"
          echo "TERRAFORM_BACKEND_REGION=${{ secrets.AWS_REGION }}" >> "$GITHUB_ENV"

      - name: Write tfvars
        run: |
          cat > infra/terraform/aws/terraform.tfvars << EOF
          aws_region          = "${{ secrets.AWS_REGION }}"
          base_domain         = "${{ secrets.FORGE_BASE_DOMAIN }}"
          admin_cidr          = "${{ secrets.FORGE_ADMIN_CIDR }}"
          ssh_public_key_path = "/dev/null"
          key_pair_name       = "forge-aws"
          EOF

      - name: Create backend config for S3
        run: |
          cat > infra/terraform/aws/backend-config.tfvars << EOF
          bucket         = "${{ env.TERRAFORM_BACKEND_BUCKET }}"
          key            = "aws/terraform.tfstate"
          region         = "${{ env.TERRAFORM_BACKEND_REGION }}"
          encrypt        = true
          dynamodb_table = "terraform-locks"
          EOF

      - name: Terraform init (com S3 backend)
        run: terraform -chdir=infra/terraform/aws init \
          -backend-config=backend-config.tfvars \
          -input=false

      - name: Terraform plan (drift detection)
        id: plan
        run: |
          set +e
          terraform -chdir=infra/terraform/aws plan \
            -detailed-exitcode \
            -refresh=true \
            -input=false \
            -out=/tmp/tfplan \
            2>&1 | tee /tmp/plan_output.txt
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          set -e

          # exit codes: 0 = sem alterações, 1 = erro, 2 = há alterações (drift)
          case $EXIT_CODE in
            0) echo "drift=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "drift=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "drift=error" >> "$GITHUB_OUTPUT"; exit $EXIT_CODE ;;
          esac

      - name: Show plan summary
        if: steps.plan.outputs.drift == 'true'
        run: |
          echo "### Drift detectado" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          # Mostrar apenas as linhas de diff (+ / - / ~) para não expor IPs no log
          grep -E "^\s*(#|\+|-|~|Plan:)" /tmp/plan_output.txt \
            | grep -v "aws_access_key\|secret\|password\|token" \
            >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Open GitHub issue on drift
        if: steps.plan.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/plan_output.txt', 'utf8');

            // Filtrar linhas sensíveis antes de por na issue
            const safe = raw
              .split('\n')
              .filter(l => /^\s*(#|\+|-|~|Plan:|No changes)/.test(l))
              .filter(l => !/secret|token|password|key_id/i.test(l))
              .join('\n');

            const title = `🚨 Terraform drift detectado — ${new Date().toISOString().slice(0,10)}`;

            // Procurar issue aberta com o mesmo título (evitar duplicados)
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            const duplicate = existing.data.find(i => i.title.startsWith('🚨 Terraform drift'));

            if (duplicate) {
              await github.rest.issues.createComment({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: duplicate.number,
                body: `### Nova detecção — ${new Date().toISOString()}\n\n\`\`\`\n${safe}\n\`\`\`\n\n[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              });
              console.log(`Comentário adicionado na issue #${duplicate.number}`);
            } else {
              const issue = await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title,
                labels: ['drift', 'infrastructure'],
                body:   `## Drift detectado na infra AWS\n\nO \`terraform plan\` encontrou diferenças entre o state e a infra real.\n\n### Alterações\n\n\`\`\`\n${safe}\n\`\`\`\n\n### Próximos passos\n1. Verificar se as alterações são esperadas\n2. Se sim: correr \`terraform apply\` para actualizar o state, ou \`terraform import\` se recursos foram criados fora do Terraform\n3. Se não: investigar quem/o quê modificou a infra\n\n[Ver run completo](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              });
              console.log(`Issue criada: #${issue.data.number}`);
            }

      - name: Fechar issue de drift se já não há drift
        if: steps.plan.outputs.drift == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'drift',
            });

            for (const issue of existing.data) {
              if (issue.title.startsWith('🚨 Terraform drift')) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  body: `✅ Drift resolvido — \`terraform plan\` não encontrou alterações em ${new Date().toISOString().slice(0,10)}.\n\n[Ver run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                console.log(`Issue #${issue.number} fechada.`);
              }
            }

      - name: Fail job if drift detected
        if: steps.plan.outputs.drift == 'true'
        run: |
          echo "::error::Drift detectado. Verifica a issue criada no repositório."
          exit 1