name: Deploy

on:
  # Manual deploy with target and options selection.
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        type: choice
        options:
          - control-plane
          - workers
          - all
        default: all
      ansible_check:
        description: "Dry-run only (--check)"
        required: false
        type: boolean
        default: false

  # Automatic deploy after the normal CI workflow passes on main.
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Do not cancel a deploy that is already running.

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to ${{ inputs.target || 'all' }}
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push'
        )
      }}

    # Configure protection rules at:
    # Settings > Environments > production > Required reviewers
    environment: production

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate AWS deploy role
        run: |
          if [ -z "${AWS_DEPLOY_ROLE_ARN}" ]; then
            echo "::error::Set the AWS_DEPLOY_ROLE_ARN repository secret."
            echo "::error::It must be an IAM role GitHub Actions can assume for temporary SSH ingress."
            exit 1
          fi
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Allow runner SSH to control plane
        id: ssh_ingress
        env:
          CONTROL_PLANE_IP: ${{ secrets.FORGE_CONTROL_PLANE_IP }}
          CONTROL_PLANE_PRIVATE_IP: ${{ secrets.FORGE_CONTROL_PLANE_PRIVATE_IP }}
          CONTROL_PLANE_SECURITY_GROUP_ID: ${{ secrets.FORGE_CONTROL_PLANE_SECURITY_GROUP_ID }}
        run: |
          runner_ip="$(curl -fsS https://checkip.amazonaws.com | tr -d '[:space:]')"
          runner_cidr="${runner_ip}/32"
          sg_id="$(printf '%s' "${CONTROL_PLANE_SECURITY_GROUP_ID}" | tr -d '[:space:]')"

          if [ -z "${sg_id}" ]; then
            sg_id="$(aws ec2 describe-instances \
              --filters "Name=ip-address,Values=${CONTROL_PLANE_IP}" \
              --query 'Reservations[].Instances[].SecurityGroups[].GroupId | [0]' \
              --output text)"
          fi

          if { [ -z "${sg_id}" ] || [ "${sg_id}" = "None" ]; } && [ -n "${CONTROL_PLANE_PRIVATE_IP}" ]; then
            sg_id="$(aws ec2 describe-instances \
              --filters "Name=private-ip-address,Values=${CONTROL_PLANE_PRIVATE_IP}" \
              --query 'Reservations[].Instances[].SecurityGroups[].GroupId | [0]' \
              --output text)"
          fi

          if [ -z "${sg_id}" ] || [ "${sg_id}" = "None" ]; then
            echo "::error::Could not find the control-plane security group."
            echo "::error::Set FORGE_CONTROL_PLANE_SECURITY_GROUP_ID or check AWS_REGION and control-plane IP secrets."
            exit 1
          fi

          echo "runner_cidr=${runner_cidr}" >> "$GITHUB_OUTPUT"
          echo "sg_id=${sg_id}" >> "$GITHUB_OUTPUT"

          permission="$(
            printf '%s' '[{"IpProtocol":"tcp","FromPort":22,"ToPort":22,"IpRanges":['
            printf '{"CidrIp":"%s","Description":"Forge GitHub Actions deploy %s"}' \
              "${runner_cidr}" \
              "${GITHUB_RUN_ID}"
            printf '%s' ']}]'
          )"
          if output="$(aws ec2 authorize-security-group-ingress \
              --group-id "${sg_id}" \
              --ip-permissions "${permission}" 2>&1)"; then
            echo "added=true" >> "$GITHUB_OUTPUT"
            echo "Opened temporary SSH ingress for ${runner_cidr} on ${sg_id}."
          elif grep -q "InvalidPermission.Duplicate" <<<"${output}"; then
            echo "added=false" >> "$GITHUB_OUTPUT"
            echo "Temporary SSH ingress for ${runner_cidr} already exists on ${sg_id}."
          elif grep -q "InvalidGroup.NotFound" <<<"${output}"; then
            echo "::error::Control-plane security group ${sg_id} was not found in ${AWS_REGION}."
            echo "::error::Check FORGE_CONTROL_PLANE_SECURITY_GROUP_ID and the AWS_REGION repository variable."
            exit 1
          else
            echo "${output}" >&2
            exit 1
          fi

      - name: Install Ansible
        run: |
          pip install --quiet \
            ansible==10.6.0 \
            ansible-lint==24.9.2

      - name: Write SSH private key
        env:
          FORGE_SSH_PRIVATE_KEY: ${{ secrets.FORGE_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${FORGE_SSH_PRIVATE_KEY}" | sed 's/\\n/\n/g' | tr -d '\r' > ~/.ssh/forge_deploy
          printf '\n' >> ~/.ssh/forge_deploy
          chmod 600 ~/.ssh/forge_deploy
          control_host="${{ secrets.FORGE_CONTROL_PLANE_IP }}"
          reachable=0
          for _ in $(seq 1 6); do
            if ssh-keyscan -T 10 -H "${control_host}" >> ~/.ssh/known_hosts 2>/dev/null; then
              reachable=1
              break
            fi
            sleep 5
          done
          if [ "${reachable}" -ne 1 ]; then
            echo "::error::Cannot reach control-plane SSH at FORGE_CONTROL_PLANE_IP:22."
            echo "::error::Check the secret value, instance state, and the AWS admin_cidr/security group."
            echo "::error::GitHub-hosted runners need SSH ingress or deploy must run from a reachable self-hosted runner/VPN."
            exit 1
          fi

      - name: Validate SSH private key
        run: |
          if ! ssh-keygen -y -f ~/.ssh/forge_deploy > ~/.ssh/forge_deploy.pub; then
            echo "::error::FORGE_SSH_PRIVATE_KEY is invalid or passphrase-protected."
            echo "::error::Use an unencrypted private key whose public key is in /home/ubuntu/.ssh/authorized_keys."
            exit 1
          fi
          echo "Deploy key fingerprint:"
          ssh-keygen -lf ~/.ssh/forge_deploy.pub

      - name: Verify control-plane SSH authentication
        run: |
          if ! ssh \
              -i ~/.ssh/forge_deploy \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ubuntu@"${{ secrets.FORGE_CONTROL_PLANE_IP }}" true; then
            echo "::error::SSH reached the control plane, but the key was rejected."
            echo "::error::FORGE_SSH_PRIVATE_KEY must match the EC2 key pair authorized for the ubuntu user."
            exit 1
          fi

      - name: Verify worker SSH through control plane
        if: ${{ inputs.target == 'workers' || inputs.target == 'all' || inputs.target == '' }}
        env:
          CONTROL_PLANE_IP: ${{ secrets.FORGE_CONTROL_PLANE_IP }}
          WORKER_IP: ${{ secrets.FORGE_WORKER_IP }}
        run: |
          if [ -z "${WORKER_IP}" ]; then
            echo "::error::FORGE_WORKER_IP is required when deploying workers."
            exit 1
          fi

          proxy_cmd="ssh -i ~/.ssh/forge_deploy"
          proxy_cmd="${proxy_cmd} -o BatchMode=yes -o IdentitiesOnly=yes"
          proxy_cmd="${proxy_cmd} -o StrictHostKeyChecking=yes"
          proxy_cmd="${proxy_cmd} -W %h:%p ubuntu@${CONTROL_PLANE_IP}"

          if ! ssh \
              -i ~/.ssh/forge_deploy \
              -o BatchMode=yes \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              -o "ProxyCommand=${proxy_cmd}" \
              ubuntu@"${WORKER_IP}" true; then
            echo "::error::SSH could not reach the worker through the control plane."
            echo "::error::FORGE_WORKER_IP must be the worker private IP reachable from the Forge VPC."
            echo "::error::The worker security group must allow SSH from the control-plane security group."
            echo "::error::The deploy public key must also be in /home/ubuntu/.ssh/authorized_keys on the worker."
            exit 1
          fi

      - name: Write Ansible inventory
        run: |
          control_ssh_args="-o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15"
          worker_ssh_args="-o IdentitiesOnly=yes"
          worker_ssh_args="${worker_ssh_args} -o StrictHostKeyChecking=accept-new"
          worker_proxy="ssh -i ~/.ssh/forge_deploy"
          worker_proxy="${worker_proxy} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          worker_proxy="${worker_proxy} -W %h:%p ubuntu@${{ secrets.FORGE_CONTROL_PLANE_IP }}"
          worker_ssh_args="${worker_ssh_args} -o ProxyCommand=\"${worker_proxy}\""
          worker_ssh_args="${worker_ssh_args} -o ConnectTimeout=15"
          cat > infra/ansible/inventory.ini << EOF
          [control_plane]
          control-plane ansible_host=${{ secrets.FORGE_CONTROL_PLANE_IP }} \
            ansible_user=ubuntu \
            ansible_ssh_private_key_file=~/.ssh/forge_deploy \
            ansible_ssh_common_args='${control_ssh_args}' \
            forge_base_domain=${{ secrets.FORGE_BASE_DOMAIN }} \
            forge_control_plane_private_ip=${{ secrets.FORGE_CONTROL_PLANE_PRIVATE_IP }}

          [workers]
          worker ansible_host=${{ secrets.FORGE_WORKER_IP }} \
            ansible_user=ubuntu \
            ansible_ssh_private_key_file=~/.ssh/forge_deploy \
            ansible_ssh_common_args='${worker_ssh_args}' \
            forge_control_plane_url=http://${{ secrets.FORGE_CONTROL_PLANE_PRIVATE_IP }}:8080 \
            forge_agent_address=${{ secrets.FORGE_WORKER_IP }} \
            forge_control_plane_private_ip=${{ secrets.FORGE_CONTROL_PLANE_PRIVATE_IP }}
          EOF

      - name: Write Ansible Vault password
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ~/.vault_pass
          chmod 600 ~/.vault_pass

      - name: Write Ansible Vault group variables
        run: |
          # The real vault.yml is generated from GitHub Secrets to avoid
          # storing encrypted files in the repo that depend on a rotated password.
          # If you prefer to manage vault.yml in the repo, remove this step and use --vault-password-file.
          mkdir -p infra/ansible/group_vars/all
          cat > infra/ansible/group_vars/all/vault.yml << EOF
          vault_forge_master_key: "${{ secrets.FORGE_MASTER_KEY }}"
          vault_forge_agent_token: "${{ secrets.FORGE_AGENT_TOKEN }}"
          vault_forge_admin_token: "${{ secrets.FORGE_ADMIN_TOKEN }}"
          vault_forge_github_webhook_secret: "${{ secrets.FORGE_GITHUB_WEBHOOK_SECRET }}"
          forge_allowed_repos:
            - ${{ secrets.FORGE_ALLOWED_REPOS }}
          vault_grafana_admin_password: "${{ secrets.GRAFANA_ADMIN_PASSWORD }}"
          EOF

      - name: Determine Ansible limit
        id: limit
        run: |
          TARGET="${{ inputs.target || 'all' }}"
          case "$TARGET" in
            control-plane) echo "limit=control_plane" >> "$GITHUB_OUTPUT" ;;
            workers)        echo "limit=workers"        >> "$GITHUB_OUTPUT" ;;
            all)            echo "limit=all"            >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Ansible syntax check
        run: |
          ansible-playbook \
            -i infra/ansible/inventory.ini \
            --limit "${{ steps.limit.outputs.limit }}" \
            --syntax-check \
            infra/ansible/playbook.yml

      - name: Run Ansible playbook${{ inputs.ansible_check && ' (--check)' || '' }}
        run: |
          ansible-playbook \
            -i infra/ansible/inventory.ini \
            --limit "${{ steps.limit.outputs.limit }}" \
            ${{ inputs.ansible_check && '--check --diff' || '' }} \
            infra/ansible/playbook.yml
        env:
          ANSIBLE_FORCE_COLOR: "1"
          ANSIBLE_HOST_KEY_CHECKING: "True"
          # Prevent Ansible output from appearing in GitHub logs in plaintext
          ANSIBLE_DISPLAY_SKIPPED_HOSTS: "false"

      - name: Smoke check - control plane health
        if: ${{ !inputs.ansible_check && (inputs.target == 'control-plane' || inputs.target == 'all' || inputs.target == '') }}
        run: |
          echo "Wait 10s for service to stabilize..."
          sleep 10
          status=$(curl -sf --max-time 10 \
            -H "Authorization: Bearer ${{ secrets.FORGE_ADMIN_TOKEN }}" \
            "https://${{ secrets.FORGE_BASE_DOMAIN }}/api/v1/deployments" \
            -o /dev/null -w "%{http_code}" || echo "000")
          echo "HTTP status: $status"
          if [[ "$status" != "200" ]]; then
            echo "::error::Control plane did not respond after deploy (HTTP $status)"
            exit 1
          fi
          echo "Control plane OK."

      - name: Revoke runner SSH ingress
        if: always() && steps.ssh_ingress.outputs.added == 'true'
        run: |
          if ! aws ec2 revoke-security-group-ingress \
              --group-id "${{ steps.ssh_ingress.outputs.sg_id }}" \
              --protocol tcp \
              --port 22 \
              --cidr "${{ steps.ssh_ingress.outputs.runner_cidr }}"; then
            echo "::warning::Failed to revoke temporary SSH ingress for ${{ steps.ssh_ingress.outputs.runner_cidr }}."
          fi

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f ~/.ssh/forge_deploy ~/.vault_pass
          rm -f infra/ansible/group_vars/all/vault.yml
          rm -f infra/ansible/inventory.ini
