name: Pull request labeler

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  labeler:
    name: Label pull request
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels
        uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false
