name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.2.3)"
        required: true

permissions:
  contents: write
  packages: write        # for GHCR if added later

# Only one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── 1. Run the full CI suite first
  ci:
    name: Full CI gate
    uses: ./.github/workflows/ci.yml

  # 2. Build binaries (amd64 + arm64)
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: ci
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            goarch: amd64
            cc: gcc
          - arch: arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
            cc: gcc

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # needed for git describe in version embedding

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc sqlite3

      - name: Embed version metadata
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ inputs.tag }}}"
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "commit=${COMMIT}" >> "$GITHUB_OUTPUT"
          echo "build_time=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Build Go binaries
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          LDFLAGS="-s -w \
            -X main.version=${{ steps.version.outputs.tag }} \
            -X main.commit=${{ steps.version.outputs.commit }} \
            -X main.buildTime=${{ steps.version.outputs.build_time }}"
          mkdir -p bin
          go build -ldflags "$LDFLAGS" -trimpath \
            -o bin/forge-control-plane \
            ./control-plane/cmd/forge-control-plane
          go build -ldflags "$LDFLAGS" -trimpath \
            -o bin/forge-exporter \
            ./cmd/forge-exporter

      - name: Build C binaries (native)
        env:
          CC: ${{ matrix.cc }}
        run: |
          $CC -std=c11 -Wall -Wextra -Werror -Wpedantic \
            -Wformat=2 -Wstack-protector -fstack-protector-strong \
            -D_FORTIFY_SOURCE=2 -O2 -pthread \
            -o bin/forge-agent \
            agent/src/forge_agent.c \
            agent/src/json_parser.c

          $CC -std=c11 -Wall -Wextra -Werror -Wpedantic \
            -Wformat=2 -Wstack-protector -fstack-protector-strong \
            -D_FORTIFY_SOURCE=2 -O2 \
            -o bin/forge-build-runner \
            build-runner/src/forge_build_runner.c

      - name: Verify binaries run
        run: |
          file bin/forge-control-plane bin/forge-exporter bin/forge-agent bin/forge-build-runner
          ./bin/forge-control-plane --version 2>/dev/null || true
          ./bin/forge-exporter --version 2>/dev/null || true

      - name: Package tarball
        run: |
          ARCHIVE="forge-linux-${{ matrix.arch }}.tar.gz"
          tar -czf "$ARCHIVE" -C bin \
            forge-control-plane \
            forge-exporter \
            forge-agent \
            forge-build-runner
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Compute checksum
        run: |
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.arch }}
          path: |
            forge-linux-${{ matrix.arch }}.tar.gz
            forge-linux-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 1

  # 3. Produce combined SHA256SUMS + publish release
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/

      - name: Build combined SHA256SUMS
        run: |
          cd dist
          # Regenerate from files to guarantee consistency
          sha256sum forge-linux-amd64.tar.gz forge-linux-arm64.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Extract changelog for this tag
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section between this tag and the previous one from CHANGELOG.md
          # Falls back to a sensible default if CHANGELOG.md doesn't exist yet
          if [[ -f CHANGELOG.md ]]; then
            awk "/^## \[?${TAG}\]?/{p=1; next} p && /^## /{exit} p{print}" CHANGELOG.md \
              > release_notes.md
          fi
          if [[ ! -s release_notes.md ]]; then
            echo "See [CHANGELOG.md](CHANGELOG.md) for full details." > release_notes.md
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          fail_on_unmatched_files: true
          files: |
            dist/forge-linux-amd64.tar.gz
            dist/forge-linux-amd64.tar.gz.sha256
            dist/forge-linux-arm64.tar.gz
            dist/forge-linux-arm64.tar.gz.sha256
            dist/SHA256SUMS

  # 4. Post-release smoke: install from release tarball and check binaries
  smoke:
    name: Post-release smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: publish
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Download and verify release tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          ARCHIVE="forge-linux-${{ matrix.arch }}.tar.gz"

          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "$ARCHIVE" \
            --pattern "${ARCHIVE}.sha256"

          sha256sum --check "${ARCHIVE}.sha256"

          tar -xzf "$ARCHIVE"
          ./forge-control-plane --version 2>/dev/null || true
          ./forge-exporter --version 2>/dev/null || true
          file forge-agent forge-build-runner
