name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: make build

      - name: Package release artifacts
        run: |
          tar -czf forge-linux-amd64.tar.gz -C bin forge-control-plane forge-exporter forge-agent forge-build-runner
          sha256sum forge-linux-amd64.tar.gz > forge-linux-amd64.tar.gz.sha256

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            forge-linux-amd64.tar.gz
            forge-linux-amd64.tar.gz.sha256