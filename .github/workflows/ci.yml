name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 1. Go: vet, lint, test ──────────────────────────────────────────────────
  go:
    name: Go (vet · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: go test (with race detector)
        run: go test -race -count=1 -timeout=120s -coverprofile=coverage.out ./...

      - name: Check coverage threshold (≥ 50 %)
        run: |
          total=$(go tool cover -func=coverage.out \
            | awk '/^total:/{gsub("%",""); print $3}')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN{if(t+0<50){print "Coverage "$total"% is below 50%"; exit 1}}'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 7

  # ── 2. C: compile (strict flags) + cppcheck ────────────────────────────────
  c:
    name: C (compile · cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cppcheck

      - name: Compile forge-agent (strict)
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Wpedantic \
              -Wformat=2 -Wformat-overflow=2 -Wformat-truncation=2 \
              -Wstack-protector -fstack-protector-strong \
              -D_FORTIFY_SOURCE=2 -O2 \
              -pthread \
              -o /tmp/forge-agent \
              agent/src/forge_agent.c \
              agent/src/json_parser.c

      - name: Compile forge-build-runner (strict)
        run: |
          gcc -std=c11 -Wall -Wextra -Werror -Wpedantic \
              -Wformat=2 -Wformat-overflow=2 -Wformat-truncation=2 \
              -Wstack-protector -fstack-protector-strong \
              -D_FORTIFY_SOURCE=2 -O2 \
              -o /tmp/forge-build-runner \
              build-runner/src/forge_build_runner.c

      - name: cppcheck (agent)
        run: |
          cppcheck --error-exitcode=1 \
            --enable=warning,portability,performance \
            --suppress=missingIncludeSystem \
            --std=c11 \
            agent/src/forge_agent.c \
            agent/src/json_parser.c

      - name: cppcheck (build-runner)
        run: |
          cppcheck --error-exitcode=1 \
            --enable=warning,portability,performance \
            --suppress=missingIncludeSystem \
            --std=c11 \
            build-runner/src/forge_build_runner.c

  # ── 3. Security scan ────────────────────────────────────────────────────────
  security:
    name: Security (gosec · trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write          # for SARIF upload
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gosec
        uses: securego/gosec@v2.26.1
        with:
          args: -fmt sarif -out gosec.sarif -exclude-generated ./...

      - name: Upload gosec SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
          category: gosec

      - name: Trivy filesystem scan
        id: trivy-scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy.sarif
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Check Trivy SARIF
        id: trivy-check
        run: |
          if [ -f trivy.sarif ]; then
            echo "sarif_present=true" >> $GITHUB_OUTPUT
          else
            echo "sarif_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy SARIF
        if: always() && steps.trivy-check.outputs.sarif_present == 'true'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy

  # ── 4. Infrastructure validation ────────────────────────────────────────────
  iac:
    name: IaC (terraform fmt/validate · ansible lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform fmt check (AWS)
        run: terraform -chdir=infra/terraform/aws fmt -check -recursive

      - name: Terraform fmt check (OCI)
        run: terraform -chdir=infra/terraform/oci fmt -check -recursive

      - name: Terraform init + validate (AWS)
        run: |
          terraform -chdir=infra/terraform/aws init -backend=false
          terraform -chdir=infra/terraform/aws validate

      - name: Terraform init + validate (OCI)
        run: |
          terraform -chdir=infra/terraform/oci init -backend=false
          terraform -chdir=infra/terraform/oci validate

      - name: Install ansible and ansible-lint
        run: |
          python3 -m pip install --upgrade pip
          pip install 'ansible>=8.0.0,<9' ansible-lint==24.9.2 --quiet

      - name: ansible-lint (syntax + best practices)
        run: |
          ansible-lint \
            --exclude infra/ansible/group_vars/all/vault.yml \
            infra/ansible/playbook.yml

  # ── 5. Shell scripts ─────────────────────────────────────────────────────────
  shell:
    name: Shell (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning

  # ── 6. forge.yaml examples validation ───────────────────────────────────────
  forgeyaml:
    name: forge.yaml examples
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build validator
        run: go test -run TestParseForgeYAML ./control-plane/internal/forgeyaml -count=1 -v

      - name: Validate all example forge.yaml files
        run: |
          cat > .ci-validate-forgeyaml.go <<'EOF'
          package main

          import (
            "fmt"
            "io/fs"
            "os"
            "path/filepath"

            "forge/control-plane/internal/forgeyaml"
          )

          func main() {
            failed := false
            err := filepath.WalkDir("examples", func(path string, d fs.DirEntry, err error) error {
              if err != nil {
                return err
              }
              if d.IsDir() || d.Name() != "forge.yaml" {
                return nil
              }
              data, err := os.ReadFile(path)
              if err != nil {
                return err
              }
              if _, err := forgeyaml.Parse(data); err != nil {
                fmt.Fprintf(os.Stderr, "%s: %v\n", path, err)
                failed = true
                return nil
              }
              fmt.Printf("%s: ok\n", path)
              return nil
            })
            if err != nil {
              fmt.Fprintln(os.Stderr, err)
              os.Exit(1)
            }
            if failed {
              os.Exit(1)
            }
          }
          EOF
          go run ./.ci-validate-forgeyaml.go

  # ── 7. E2E smoke (Linux only, no network) ────────────────────────────────────
  e2e:
    name: E2E smoke
    runs-on: ubuntu-latest
    needs: [go, c]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps
        run: sudo apt-get install -y --no-install-recommends gcc sqlite3

      - name: Build all binaries
        run: make build

      - name: Run E2E smoke test
        run: bash scripts/e2e-local.sh
        env:
          FORGE_ALLOW_LOCAL_REPOS: "true"

  # ── Status gate (required by branch protection) ──────────────────────────────
  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [go, c, security, iac, shell, e2e]
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          failed = [k for k,v in needs.items() if v['result'] not in ('success','skipped')]
          if failed:
              print('Failed jobs:', ', '.join(failed))
              sys.exit(1)
          print('All jobs passed.')
          "