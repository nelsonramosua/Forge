name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: motivation
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what limitation does it address?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the interface, behaviour, and constraints you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why did you rule them out?
    validations:
      required: false

  - type: checkboxes
    id: affected-components
    attributes:
      label: Affected components
      description: Which parts of Forge would this touch?
      options:
        - label: forge.yaml schema
        - label: Control plane API
        - label: Scheduler
        - label: forge-agent
        - label: forge-build-runner
        - label: Reverse proxy / Caddy integration
        - label: Observability
        - label: Terraform / Ansible infra
        - label: Documentation

  - type: dropdown
    id: implementation
    attributes:
      label: Would you be willing to implement this?
      options:
        - "Yes, I would like to open a PR"
        - "Yes, but I would need guidance"
        - "No, just proposing"
    validations:
      required: true
