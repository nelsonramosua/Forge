name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Steps to reproduce the behaviour. The more specific, the better.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - control-plane
        - forge-agent
        - forge-build-runner
        - forge.yaml
        - Terraform / Ansible
        - observability
        - examples
        - other
    validations:
      required: true

  - type: dropdown
    id: deployment-target
    attributes:
      label: Deployment target
      options:
        - local
        - AWS
        - OCI
        - other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / distro
      placeholder: "Ubuntu 22.04, macOS 15, etc."
    validations:
      required: false

  - type: input
    id: go-version
    attributes:
      label: Go version
      placeholder: "go version"
    validations:
      required: false

  - type: input
    id: gcc-version
    attributes:
      label: GCC version
      placeholder: "gcc --version"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact tokens, IPs, and secrets before posting.
      render: shell
    validations:
      required: false

  - type: textarea
    id: forge-yaml
    attributes:
      label: forge.yaml
      description: Paste the relevant forge.yaml with secrets removed, if applicable.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that may help us understand the issue.
    validations:
      required: false
