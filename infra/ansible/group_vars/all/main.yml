ansible_python_interpreter: /usr/bin/python3

# Put deployment-specific values in an ignored file such as
# infra/ansible/group_vars/all/main.local.yml.
#
# Example:
# forge_allowed_repos:
#   - YOUR_GITHUB_USER/YOUR_REPO
#
# This variable is required at runtime; leaving it empty makes the control plane fail fast on startup.
#
# forge_allowed_branches:
#   - main
#
# Reserve admin.BASE_DOMAIN for the Forge admin console repository.
#
# forge_admin_app_repo: YOUR_GITHUB_USER/YOUR_ADMIN_REPO

# Enable Caddy ACME DNS-01 challenge via Cloudflare.
# Requires vault_cloudflare_api_token in vault.yml with Zone.DNS:Edit and Zone.Zone:Read.
forge_caddy_dns_cloudflare_enabled: false
